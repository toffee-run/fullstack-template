volumes:
  signoz-data: {}

services:
  signoz:
    build: .
    environment:
      SIGNOZ_SQLSTORE_SQLITE_PATH: /var/lib/signoz/signoz.db
    volumes: [signoz-data:/var/lib/signoz]

  signoz-bootstrap:
    image: python:3.11-alpine
    restart: on-failure
    depends_on:
      signoz: { condition: service_healthy }
    volumes:
      - ./dashboards:/dashboards:ro
      - ./bootstrap.py:/bootstrap.py:ro
    command: python /bootstrap.py
