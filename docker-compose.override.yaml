x-restart: &restart
  restart: unless-stopped

x-frontend-dep: &frontend-dep
  frontend: { condition: service_healthy }

x-otel-collector-dep: &otel-collector-dep
  otel-collector: { condition: service_healthy }

x-clickhouse-dep: &clickhouse-dep
  clickhouse: { condition: service_healthy }

services:
  traefik:
    <<: *restart
    depends_on: { <<: [*frontend-dep, *otel-collector-dep] }
    env_file: [./.env/.frontend, ./.env/.otel-collector]

  frontend:
    <<: *restart
    depends_on: { <<: [*otel-collector-dep] }
    env_file: [./.env/.frontend, ./.env/.otel-collector]

  otel-collector-migrator:
    restart: on-failure
    depends_on: { <<: [*clickhouse-dep] }
    env_file: [./.env/.clickhouse]

  otel-collector:
    <<: *restart
    depends_on: { <<: [*clickhouse-dep] }
    env_file: [./.env/.clickhouse, ./.env/.otel-collector]

  signoz:
    <<: *restart
    depends_on:
      otel-collector-migrator: { condition: service_completed_successfully }
    env_file: [./.env/.clickhouse, ./.env/.signoz]

  clickhouse:
    <<: *restart
    env_file: [./.env/.clickhouse]
